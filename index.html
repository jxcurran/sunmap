<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sun Path</title>
    <!-- NFR-4.4: frame-ancestors cannot be enforced via <meta> (browsers ignore it there);
         it must be set as an HTTP response header by whatever serves this build. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        connect-src 'self' https://nominatim.openstreetmap.org https://tiles.openfreemap.org;
        img-src 'self' data: https://tiles.openfreemap.org;
        worker-src 'self' blob:;
        font-src 'self' data:;"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <div id="ui-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
